    let activeChapterIndex = 0;

    function renderBookPage(idx) {
        const leftCanvas = document.getElementById("leftBookPageCanvas");
        const rightCanvas = document.getElementById("rightBookPageCanvas");
        const turnerLabel = document.getElementById("pageTurnerText");

        leftCanvas.classList.remove("fade-page");
        rightCanvas.classList.remove("fade-page");
        void leftCanvas.offsetWidth; 
        leftCanvas.classList.add("fade-page");
        rightCanvas.classList.add("fade-page");

        const node = bookDatabase[idx];

        if (node.isIndex) {
            leftCanvas.innerHTML = node.leftHtml;
            rightCanvas.innerHTML = node.rightHtml;
            turnerLabel.innerText = "FRONT INDEX";
        } else {
            leftCanvas.innerHTML = `
                <div class="photo-card-holder">
                    <img src="${node.imageSrc}" class="photo-img" alt="${node.imageTitle}">
                    <div class="media-source-title">${node.imageTitle}</div>
                </div>
                <div class="vocab-box" style="width: 100%; max-width: 420px;">
                    <p style="font-weight:800; text-transform:uppercase; font-size:11.5px; letter-spacing:1px; border-bottom: 1px solid #d1fae5; padding-bottom:8px; margin-bottom:12px; color:#042f2e;">📚 Vocabulary Insights</p>
                    <p>${node.vocab}</p>
                </div>
            `;

            let growthItemsHtml = "";
            node.growth.forEach(item => {
                growthItemsHtml += `<li>${item}</li>`;
            });

            rightCanvas.innerHTML = `
                <h2>${node.title}</h2>
                <div class="page-meta-tags">${node.meta}</div>
                
                <div class="section-title">Summary</div>
                <p class="page-text">${node.summary}</p>
                
                <div class="section-title">My Personal Opinion</div>
                <p class="page-text">${node.opinion}</p>
                
                <div class="section-title">Reflective Growth — Key Takeaways</div>
                <ul class="bullet-list">
                    ${growthItemsHtml}
                </ul>
            `;
            turnerLabel.innerText = `CHAPTER: ${idx.toString().padStart(2, '0')} / 10`;
        }

        rightCanvas.scrollTop = 0;
    }

    function turnNextPage() {
        if (activeChapterIndex < bookDatabase.length - 1) activeChapterIndex++;
        else activeChapterIndex = 0; 
        renderBookPage(activeChapterIndex);
    }

    function turnBackPage() {
        if (activeChapterIndex > 0) activeChapterIndex--;
        else activeChapterIndex = bookDatabase.length - 1; 
        renderBookPage(activeChapterIndex);
    }

    function jumpToIndex() {
        activeChapterIndex = 0;
        renderBookPage(activeChapterIndex);
    }

    function flipToChapter(chapterIdx) {
        if (chapterIdx >= 0 && chapterIdx < bookDatabase.length) {
            activeChapterIndex = chapterIdx;
            renderBookPage(activeChapterIndex);
        }
    }

    window.onload = function() {
        renderBookPage(0);
    };
</script>
